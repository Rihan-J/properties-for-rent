services:
  - type: web
    name: properties-backend
    env: node
    plan: free

    rootDir: backend

    buildCommand: npm install
    startCommand: npm start

    autoDeploy: true

    envVars:
      - key: NODE_ENV
        value: production

      - key: DATABASE_URL
        sync: false

      - key: JWT_SECRET
        sync: false

      - key: CLOUDINARY_CLOUD_NAME
        sync: false

      - key: CLOUDINARY_API_KEY
        sync: false

      - key: CLOUDINARY_API_SECRET
        sync: false

      - key: CORS_ORIGIN
        sync: false

    healthCheckPath: /api/health
